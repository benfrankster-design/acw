# ---
# class: operational
# authority: canonical
# stability: stable
# loaded_by_agent: yes
# ---
#
# acw-state.yaml — ACW self-contract
#
# Single authoritative statement of the current release truth. Prose files
# may describe mechanisms, rationale, and examples, but this file is the
# machine-checkable source of truth for "what is ACW right now."
#
# When a prose file disagrees with this file, this file wins and the prose
# gets a decision-log entry to reconcile. This is ACW applying its own
# contract-registry thesis to itself — the smallest possible self-contract.
#
# Edited only via a decision-log entry. Every edit bumps `version` or
# `last_reconciled`.

version: "0.5.0"
last_reconciled: "2026-05-02"

# Version this instance is synced to in the recommended-blocks registry
# (rules/instance-current-manifest.md). Used by /acw-session start drift
# check to compare against each entry's earned-in version. Bumped
# automatically by /acw-instance upgrade after a successful reconciliation.
last_reconciled_version: "0.5.0"

# Declares whether this instance publishes canonical content downstream to
# other instances. ACW itself sets this to true (it IS the upstream source for
# every scaffolded instance); every child instance defaults to false. Gates
# the propagation behavior in capture-and-metabolize Phase 2 — see the
# is_canonical_source entry in rules/instance-current-manifest.md.
is_canonical_source: true

# ACW is an instance of itself — it has its own substrate, follows its own
# rules, and dogfoods its own machinery. It also serves as a template for
# downstream consumers. This block makes ACW valid input to capture-and-metabolize
# and the rest of the skill suite. Existing legacy ids (D-001..D-005) stay
# unprefixed; new entries use D-ACW-NNN.
project:
  name: "ACW"
  code: "ACW"
  domain: "meta-template"

# =============================================================================
# Three-layer manifest — see LAYERS.md for the explainer.
#
# template_layer  — same file in ACW and every instance (generic)
# instance_layer  — ACW has populated content; instances get a templated form
# meta_layer      — exists only in ACW, never propagated to instances
#
# The scaffold tool reads template_layer and instance_layer to bootstrap a
# new instance. meta_layer is intentionally NOT iterated by the scaffolder.
# capture-and-metabolize maintains these lists additively (default new files
# to instance_layer; promotion to template_layer or meta_layer requires an
# explicit decision-log entry).
# =============================================================================

template_layer:
  # Generic doctrine — copied verbatim
  - AGENTS.md
  - DEFERRED.md
  - bootstrap/
  - migration/
  - rules/canon-governance.md
  - rules/canon-schema.yaml
  - rules/canon.yaml
  - rules/capability-broker.md
  - rules/decision-tracking.md
  - rules/incident-tracking.md
  - rules/instance-current-manifest.md
  - rules/manifest-discipline.md
  - rules/multi-instance-topology.md
  - rules/pipeline-roles.md
  - rules/promotion-ritual.md
  - rules/skill-format.md
  - rules/task-tracking.md
  - rules/vocabulary-lint.md
  - skills/example-skill/
  - skills/acw-instance/
  - skills/acw-session/
  - tests/
  - tools/lint-vocab.py
  - tools/log-incident.py
  - tools/manifest.py
  - tools/scaffold-instance.py
  - tools/templates/

instance_layer:
  # ACW's own content lives here; instances get the templated initial form.
  - path: acw-state.yaml
    template: tools/templates/acw-state.yaml.tmpl
  - path: glossary.md
    template: tools/templates/glossary.md.tmpl
  - path: threat-model.md
    template: tools/templates/threat-model.md.tmpl
  - path: decisions/decision-log.md
    template: tools/templates/decision-log.md.tmpl
  - path: rules/instance-hard-rules.md
    template: tools/templates/instance-hard-rules.md.tmpl
  - path: research/01-problem-framing.md
    template: tools/templates/problem-framing.md.tmpl
  - path: research/evolution.md
    template: tools/templates/evolution.md.tmpl
  - path: research/sources.md
    template: tools/templates/sources.md.tmpl
  - path: research/research-state.yaml
    template: tools/templates/research-state.yaml.tmpl
  - path: tasks-status.md
    template: tools/templates/tasks-status.md.tmpl
  - path: build-log.md
    template: tools/templates/build-log.md.tmpl
  - path: incidents.jsonl
    template: null    # empty initial state, no token substitution
  # README.md — ACW's own README at root is meta_layer (about ACW itself).
  # This entry instructs the scaffolder to render a fresh README into new
  # instances. The path is the SAME at instance root, but ACW's root README
  # is not what gets propagated.
  - path: README.md
    template: tools/templates/README.md.tmpl
    instance_only: true   # do not expect a populated counterpart at ACW root
  - path: integrations/README.md
    template: tools/templates/integrations-README.md.tmpl
  # Host-specific entry files implementing AGENTS.md directive 7. Each host's
  # entry file is instance_layer with template: null because content is
  # host-specific and regenerable; the scaffolder writes it directly when
  # --host matches. Host entry files are maintained by the session-end
  # bookend skill (Phase 2 surfaces proposed edits when substrate shifts).
  - path: CLAUDE.md
    template: null
    host: claude-code

meta_layer:
  # About ACW itself — not propagated to instances
  - LINEAGE.md
  - AUTHOR.md
  - SKEPTIC.md
  - ORCHESTRATION.md
  - CHANGELOG.md
  - LAYERS.md
  - README.md
  - LICENSE-CODE
  - LICENSE-CONTENT
  - research/08-cross-model-audit.md
  - research/09-gsg-copilot-instance-extensions.md
  - research/10-multi-instance-topology.md
  - skills/capture-session/             # superseded; awaiting manual delete
  - skills/upgrade-instance/            # superseded by acw-instance in 0.4.0; awaiting manual delete
  - skills/resume-session/              # superseded by acw-session (verb: start) in 0.4.0; awaiting manual delete
  - skills/capture-and-metabolize/      # superseded by acw-session (verb: end) in 0.4.0; awaiting manual delete

# Empty directories the scaffold tool creates with .gitkeep so the
# canonical layout is present from session zero.
empty_dirs:
  - research/sessions
  - research/queries
  - research/queries/_consumed
  - skills
  - deferred
  - _buffer
  - runbooks
  - briefings

# =============================================================================
# Operational substrate references
# =============================================================================

# Files agent hosts should auto-load at session start. Maintained additively
# by capture-and-metabolize. See AGENTS.md directive 7.
auto_load_at_session_start:
  - decisions/decision-log.md
  - rules/instance-hard-rules.md
  - rules/manifest-discipline.md
  - rules/instance-current-manifest.md
  - rules/multi-instance-topology.md
  - tasks-status.md
  - glossary.md
  - incidents.jsonl

# Cross-repo write surfaces explicitly allowed for this instance.
cross_repo_writes: []

# Substrate files that diverge from ACW canonical with an absorption
# candidate sent upstream awaiting review. Schema in
# rules/multi-instance-topology.md § "Divergence markers."
divergent_pending_review: []

# Substrate files or directories that intentionally diverge from ACW
# canonical and will not be promoted upstream. Each entry requires a
# decision-log entry naming the rationale.
instance_specific_substrate: []

# Threshold for /acw-instance upgrade adopt-mode. Above this count of
# non-canonical markdown files in decisions/ or rules/, adopt-mode bails
# and points at /acw-instance audit. See rules/instance-current-manifest.md.
adopt_mode_organic_threshold: 5

# Optional synapse log path for operator-personal cross-project day-index.
synapse_log_path: null

# Voice references applied during transcript cleanup.
voice: []

# Substrate file paths. The bookend skills read from this block; instances may
# override any path. Canonical defaults match this list and are documented in
# rules/manifest-discipline.md. If a key is absent from this block, consumers
# fall back to the canonical default for that key.
paths:
  decisions_log: decisions/decision-log.md
  tasks_status: tasks-status.md
  build_log: build-log.md
  glossary: glossary.md
  threat_model: threat-model.md
  incidents: incidents.jsonl
  evolution: research/evolution.md
  sources: research/sources.md
  research_state: research/research-state.yaml
  problem_framing: research/01-problem-framing.md
  session_captures_dir: research/sessions
  research_queries_dir: research/queries
  research_queries_consumed_dir: research/queries/_consumed
  buffer_dir: _buffer

deferred_canonical_source: DEFERRED.md
deferred_derived_view: deferred/
deferred_drift_check: tools/log-incident.py check-drift

# Normative shape of the role enum.
role_schema:
  mode: four-group-normative
  normative_groups:
    - orchestrator
    - pipeline-worker
    - guardian
    - broker-sideband
  informative_appendix: sixteen-role-taxonomy
  appendix_status: informative-only

canon_authority:
  mode: n-authority
  default_value: operator
  declared_in: rules/instance-hard-rules.md
  schema_field: approval_authority
  schema_type: string

decision_tracking:
  mode: single-file
  file: decisions/decision-log.md
  sections:
    - "Open Questions"
    - "Decisions and Rationale"
    - "Constraints and Gotchas"
    - "Resolved Questions"
  split_threshold: "earned by promotion ritual when file is too large to navigate"

release_gates:
  - "tools/lint-vocab.py exits 0 on template's own content"
  - "tools/log-incident.py check-drift exits 0"
  - "python -m unittest discover tests exits 0"
  - "every .md file has class/authority/stability/loaded_by_agent frontmatter"
  - "every file at root or in rules/, tools/, skills/ is classified in template_layer, instance_layer, or meta_layer"

earn_by_incident:
  enabled: true
  threshold_severity: med
  threshold_count: 3
  ledger: incidents.jsonl
  exception: "single-incident activation triggers declared per-primitive in DEFERRED.md"
